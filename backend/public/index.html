<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laundry Order Management</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <h1>Laundry Order Management</h1>
      <p>A lightweight control panel for orders, customers, status tracking, billing, and dashboard reporting.</p>
    </header>

    <div class="grid">
    <section class="card">
      <h2>Dashboard</h2>
      <div id="dashboard"></div>
      <button type="button" onclick="loadDashboard()">Refresh Dashboard</button>
    </section>

    <section class="card">
      <h2>Create Customer</h2>
      <label for="customerName">Name</label>
      <input id="customerName" placeholder="Jane Doe" />
      <label for="customerPhone">Phone</label>
      <input id="customerPhone" placeholder="555-1234" />
      <button type="button" onclick="createCustomer()">Create Customer</button>
      <div id="customerMessage" class="message"></div>
    </section>
  </div>

  <div class="grid spaced-grid">
    <section class="card">
      <h2>Create Order</h2>
      <label for="orderCustomerId">Customer ID</label>
      <input id="orderCustomerId" placeholder="Paste customer id" />
      <label for="itemName">Item Name</label>
      <input id="itemName" placeholder="Shirt" />
      <label for="itemQuantity">Quantity</label>
      <input id="itemQuantity" type="number" value="1" />
      <label for="itemPrice">Unit Price</label>
      <input id="itemPrice" type="number" value="5" />
      <label for="taxRate">Tax Rate</label>
      <input id="taxRate" type="number" value="0.1" step="0.01" />
      <label for="discount">Discount</label>
      <input id="discount" type="number" value="0" />
      <label for="orderNotes">Notes</label>
      <textarea id="orderNotes" rows="3" placeholder="Special requests"></textarea>
      <button type="button" onclick="createOrder()">Create Order</button>
      <div id="orderMessage" class="message"></div>
    </section>

    <section class="card">
      <h2>Order Filters</h2>
      <label for="filterStatus">Status</label>
      <select id="filterStatus">
        <option value="">All</option>
        <option value="RECEIVED">RECEIVED</option>
        <option value="PROCESSING">PROCESSING</option>
        <option value="READY">READY</option>
        <option value="DELIVERED">DELIVERED</option>
      </select>
      <label for="filterCustomerName">Customer Name</label>
      <input id="filterCustomerName" placeholder="Jane" />
      <label for="filterCustomerPhone">Customer Phone</label>
      <input id="filterCustomerPhone" placeholder="555" />
      <button type="button" onclick="loadOrders()">Load Orders</button>
      <div id="filterMessage" class="message"></div>
    </section>
  </div>

  <section class="card full-width spaced-grid">
    <h2>Orders</h2>
    <div id="ordersList">
      <p class="empty-state">No orders loaded yet. Use filters or create a new order to begin.</p>
    </div>
  </section>

  <script src="app.js" defer></script>
</main>
</body>
</html>
